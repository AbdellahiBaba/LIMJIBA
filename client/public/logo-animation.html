<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIMJIBA - لمجيبة | Logo Reveal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060B14;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .logo-container {
    width: min(90vw, 700px);
    height: min(90vh, 700px);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg { width: 100%; height: 100%; }
</style>
</head>
<body>
<div class="logo-container">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid meet">
  <defs>
    <filter id="glowNavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowGold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#C9A84C" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowNavyStrong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#1B3A5C" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="organicMotion">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="3" result="noise">
        <animate attributeName="seed" values="1;5;1" dur="8s" repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#B8963F"/>
      <stop offset="50%" stop-color="#D4B55A"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <radialGradient id="mapGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0.08"/>
    </radialGradient>
    <clipPath id="mapClip">
      <rect x="180" y="120" width="440" height="300" rx="10"/>
    </clipPath>
  </defs>

  <style>
    @keyframes drawStroke {
      from { stroke-dashoffset: var(--dash-len); }
      to   { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fillReveal {
      0%   { fill-opacity: 0; stroke-opacity: 1; }
      100% { fill-opacity: 1; stroke-opacity: 0.2; }
    }
    @keyframes mapDotsFade {
      0%   { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes subtleFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-3px); }
    }
    @keyframes planeEntry {
      0%   { stroke-dashoffset: var(--dash-len); transform: translateX(-10px); }
      100% { stroke-dashoffset: 0; transform: translateX(0); }
    }
    @keyframes goldShimmer {
      0%   { filter: url(#glowGold) brightness(1); }
      50%  { filter: url(#glowGold) brightness(1.15); }
      100% { filter: url(#glowGold) brightness(1); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.4; }
      50%      { opacity: 0.8; }
    }

    .world-map {
      opacity: 0;
      animation: mapDotsFade 2s ease-out 0.3s forwards;
    }

    .angular-shape {
      --dash-len: 1200;
      stroke-dasharray: var(--dash-len);
      stroke-dashoffset: var(--dash-len);
      fill-opacity: 0;
      animation:
        drawStroke 1.8s cubic-bezier(0.4,0,0.2,1) 0.8s forwards,
        fillReveal 1.2s ease 2.6s forwards;
    }

    .camel-body {
      --dash-len: 2000;
      stroke-dasharray: var(--dash-len);
      stroke-dashoffset: var(--dash-len);
      fill-opacity: 0;
      animation:
        drawStroke 2s cubic-bezier(0.4,0,0.2,1) 1.5s forwards,
        fillReveal 1.2s ease 3.5s forwards;
    }

    .camel-head {
      --dash-len: 800;
      stroke-dasharray: var(--dash-len);
      stroke-dashoffset: var(--dash-len);
      fill-opacity: 0;
      animation:
        drawStroke 1.2s cubic-bezier(0.4,0,0.2,1) 2s forwards,
        fillReveal 1.2s ease 3.5s forwards;
    }

    .rider {
      --dash-len: 600;
      stroke-dasharray: var(--dash-len);
      stroke-dashoffset: var(--dash-len);
      fill-opacity: 0;
      animation:
        drawStroke 1s cubic-bezier(0.4,0,0.2,1) 2.3s forwards,
        fillReveal 1.2s ease 3.5s forwards;
    }

    .airplane-body {
      --dash-len: 1500;
      stroke-dasharray: var(--dash-len);
      stroke-dashoffset: var(--dash-len);
      fill-opacity: 0;
      animation:
        planeEntry 1.5s cubic-bezier(0.4,0,0.2,1) 3s forwards,
        fillReveal 1s ease 4.5s forwards;
    }

    .airplane-wings {
      --dash-len: 800;
      stroke-dasharray: var(--dash-len);
      stroke-dashoffset: var(--dash-len);
      fill-opacity: 0;
      animation:
        drawStroke 1s cubic-bezier(0.4,0,0.2,1) 3.5s forwards,
        fillReveal 1s ease 4.5s forwards;
    }

    .ground-base {
      --dash-len: 600;
      stroke-dasharray: var(--dash-len);
      stroke-dashoffset: var(--dash-len);
      fill-opacity: 0;
      animation:
        drawStroke 1s cubic-bezier(0.4,0,0.2,1) 4.2s forwards,
        fillReveal 0.8s ease 5.2s forwards;
    }

    .arabic-text {
      --dash-len: 3000;
      stroke-dasharray: var(--dash-len);
      stroke-dashoffset: var(--dash-len);
      fill-opacity: 0;
      animation:
        drawStroke 2.5s cubic-bezier(0.4,0,0.2,1) 4.8s forwards,
        fillReveal 1.2s ease 7.3s forwards;
    }

    .importing-text {
      --dash-len: 2000;
      stroke-dasharray: var(--dash-len);
      stroke-dashoffset: var(--dash-len);
      fill-opacity: 0;
      animation:
        drawStroke 2s cubic-bezier(0.4,0,0.2,1) 6.5s forwards,
        fillReveal 1s ease 8.5s forwards;
    }

    .importing-text-filled {
      opacity: 0;
      animation: fadeIn 1.5s ease 8.5s forwards, goldShimmer 4s ease-in-out 10s infinite;
    }

    .final-glow {
      opacity: 0;
      animation: fadeIn 2s ease 8s forwards, pulseGlow 4s ease-in-out 10s infinite;
    }

    .logo-group {
      animation: subtleFloat 6s ease-in-out 9s infinite;
    }
  </style>
